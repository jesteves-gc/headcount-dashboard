name: Refresh Headcount Dashboard

on:
  # Daily at 8am ET (12:00 UTC) on weekdays
  schedule:
    - cron: '0 12 * * 1-5'

  # Allow manual trigger from GitHub Actions UI
  workflow_dispatch:

jobs:
  refresh:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Fetch Pigment data and update dashboard
        env:
          PIGMENT_EXPORT_TOKEN: ${{ secrets.PIGMENT_EXPORT_TOKEN }}
        run: python refresh.py

      - name: Commit and push if data changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html
          if git diff --staged --quiet; then
            echo "No data changes — skipping commit"
          else
            git commit -m "chore: refresh dashboard data $(date -u '+%Y-%m-%d %H:%M UTC')"
            git push
          fi
